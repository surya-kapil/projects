<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="currency.css">
</head>
<body>
        <div class="main-content">
            <div class="headline">
                <h1>Currency Converter</h1>
            </div>

            <div class="converter">
                <div class="small-headline-div">
                    <h3>Enter Amount:</h3>
                </div>


                <div class="money-input-div">
                    <input type="text" placeholder="Enter Value" id="value">
                </div>


                <div class="country-input-div">
                    <select name="" id="from-country">
                        <option value="#">No Country Selected</option>
                    </select>

                    <p>TO</p>

                    <select name="" id="to-country">
                        <option value="#">No Country Selected</option>
                    </select>
                </div>


                <div class="convert-button-div">
                    <button id="convert-button">Convert</button>
                </div>


                <div id="converted-value">

                </div>
            </div>
        </div>
    <script src="currency.js"></script>
</body>
</html>
