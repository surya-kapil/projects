<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <div class="main-content">
        <div class="headline">
            <h1>Calculator</h1>
        </div>

        <div class="calculator">
            <div class="input-div">
                <input type="text" value="0" id="answer-section">
            </div>
            <div class="number-div">
                <table>
                    <tr>
                        <td><button class="bg-lightgray number">1</button></td>
                        <td><button class="bg-lightgray number">2</button></td>
                        <td><button class="bg-lightgray number">3</button></td>
                        <td><button class="bg-maroon" id="clear">C</button></td>
                        <td><button class="bg-maroon operator" id="remainder">%</button></td>
                    </tr>

                    <tr>
                        <td><button class="bg-lightgray number">4</button></td>
                        <td><button class="bg-lightgray number">5</button></td>
                        <td><button class="bg-lightgray number">6</button></td>
                        <td><button class="bg-maroon operator" id="plus">+</button></td>
                        <td><button class="bg-maroon operator" id="minus">-</button></td>
                    </tr>

                    <tr>
                        <td><button class="bg-lightgray number">7</button></td>
                        <td><button class="bg-lightgray number">8</button></td>
                        <td><button class="bg-lightgray number">9</button></td>
                        <td><button class="bg-maroon operator" id="divide">/</button></td>
                        <td><button class="bg-maroon operator" id="subtract">x</button></td>
                    </tr>

                    <tr>
                        <td><button class="bg-lightgray number">.</button></td>
                        <td><button class="bg-lightgray number">0</button></td>
                        <td><button class="bg-lightgray" id="equals">=</button></td>
                        <td><button class="bg-maroon" id="delete">Del</button></td>
                        <td><button class="bg-maroon operator" id="exp">Exp</button></td>
                    </tr>
                </table>
            </div>

        </div>
    </div>
    <script src="calculator.js"></script>
</body>
</html>
