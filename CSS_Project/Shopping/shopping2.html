<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="shopping2.css">
</head>
<body>
     <div class="header">
        <h1>SneakerZone</h1>

        <div class="gender">
            <a href="#">Men</a>
            <a href="#">Women</a>
            <a href="#">Kids</a>
        </div>

        <div class="search-div">
            <input type="text" placeholder="search">
            🛒
        </div>
    </div>

        <div class="content">
            <div class="shoes">
                <img src="https://ik.imagekit.io/d9mvewbju/Course/BigbinaryAcademy/shoe7-larger-a_Ux2ekfF45.jpg?updatedAt=1728893954940" alt="">
                <img src="https://ik.imagekit.io/d9mvewbju/Course/BigbinaryAcademy/shoe7-larger-b_dv1lRR_EA.jpg?updatedAt=1728893902496" alt="">
            </div>

            <div class="details">
                <h1>Action Hyper High Side View</h1>

                <p>Men's shoes</p>

                <p>MRP: 250$</p>

                <p class="size-select">Select Size:</p>

                <div class="size-div">
                    <button class="size-btn">UK 10</button>
                
                    <button class="size-btn">UK 10.5</button>
                    
                    <button class="size-btn"> UK 6</button>

                    <br>
                    
                    <button class="size-btn">UK 11</button>
                    
                    <button class="size-btn">UK 9.5</button>
                    
                    <button class="size-btn">UK 11.5</button>
                </div>

                

                <div class = "purchase">
                    <button class="add">Add to Bag</button>
                    <button class="favourite">Favourite</button>
                </div>
            </div>
        </div>

</body>
</html>
